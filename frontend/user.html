<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NRSC Assistant</title>

  <link rel="stylesheet" href="/css/styles.css?v=2026-chat-ui-3">
</head>

<body class="chatgpt-body">

<div class="chat-layout">

  <!-- SIDEBAR -->
  <aside class="chat-sidebar">

    <div class="sidebar-top">

      <h1 class="logo">
        NRSC User
      </h1>

      <button
        id="newChatBtn"
        class="new-chat-btn"
        type="button"
      >
        New chat
      </button>

      <input
        type="search"
        id="conversationSearch"
        class="conversation-search"
        placeholder="Search conversations..."
        autocomplete="off"
      >

    </div>

    <!-- Conversations -->
    <div
      id="conversationList"
      class="conversation-list"
    >

      <div class="conversation-empty">
        No conversations yet
      </div>

    </div>

    <!-- Sidebar Bottom -->
    <div class="sidebar-bottom">

      <button
        id="clearHistoryBtn"
        class="sidebar-btn secondary"
        type="button"
      >
        Clear chats
      </button>

      <button
        data-logout
        class="sidebar-btn"
        type="button"
      >
        Logout
      </button>

    </div>

  </aside>

  <!-- MAIN -->
  <main class="chat-main">

    <!-- HEADER -->
    <header class="chat-header">

      <div class="chat-header-left">

        <h2 id="activeChatTitle">
          New conversation
        </h2>

        <p id="activeChatMeta">
          Ask anything about your uploaded documents
        </p>

      </div>

    </header>

    <!-- CHAT AREA -->
    <section
      id="chatMessages"
      class="chat-messages"
    >

      <div class="welcome-screen">

        <h1>
          How can I help you today?
        </h1>

        <p>
          Ask questions about your NRSC documents.
        </p>

      </div>

    </section>

    <!-- COMPOSER -->
    <footer class="chat-composer">

      <form
        id="askForm"
        class="composer-form"
      >

        <div class="composer-box">

          <textarea
            id="question"
            rows="1"
            maxlength="5000"
            placeholder="Message NRSC Knowledge Assistant..."
            required
          ></textarea>

          <button
            type="submit"
            class="send-btn btn-submit"
            aria-label="Send message"
          >
            <span
              id="submitSpinner"
              class="spinner-inline"
              style="display:none;"
            ></span>
            <span id="submitText" class="send-btn-icon" aria-hidden="true">↑</span>
          </button>

        </div>

      </form>

    </footer>

  </main>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="/js/api.js?v=2026"></script>
<script src="/js/chat-history-manager.js?v=2026-4"></script>
<script src="/js/user.js?v=2026-4"></script>

</body>
</html>
